# Render Blueprint — Helmaand CTF e-Commerce Platform
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: Helmaand
    runtime: python
    plan: free
    rootDir: .
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
      python manage.py seed_data
    startCommand: gunicorn perfect.wsgi:application
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: helmaand.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://helmaand.onrender.com
      - key: PYTHON_VERSION
        value: "3.12.7"
