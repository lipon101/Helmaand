{% extends 'base.html' %}

{% block title %}Staff Login | Helmaand{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card card-dark p-4 shadow">
                <h2 class="text-center gold-text mb-4">Staff Login</h2>
                <p class="text-secondary small text-center mb-3">
                    Restricted area — staff access only.
                </p>
                <!-- VULNERABLE (SQLi - Auth bypass): the view builds a raw SQL query by
                     concatenating username and password. Classic injection bypasses auth. -->
                <form method="POST" action="{% url 'shop:staff_login' %}">
                    <div class="mb-3">
                        <label class="form-label text-light">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter Username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-light">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter Password" required>
                    </div>
                    <button type="submit" class="btn btn-gold w-100 mt-3">Staff Login</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
