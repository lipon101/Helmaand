{% extends 'base.html' %}

{% block title %}Staff Login | Helmaand{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card card-dark p-4 shadow">
                <h2 class="text-center gold-text mb-4">Staff Login</h2>
                <p class="text-center mb-3" style="color: #aaa;">
                    Restricted area — staff access only.
                </p>
                <form method="GET" action="{% url 'shop:staff_login' %}">
                    <div class="mb-3">
                        <label class="form-label text-light">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter Username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-light">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter Password" required>
                    </div>
                    <button type="submit" class="btn btn-gold w-100 mt-3">Staff Login</button>
                </form>

                {% if error_message %}
                <div class="mt-3 p-3" style="background: #2a1a1a; border: 1px solid #5a2a2a; border-radius: 6px;">
                    <div class="d-flex align-items-start">
                        <i class="fas fa-exclamation-triangle text-danger me-2 mt-1"></i>
                        <div>
                            <strong class="text-danger">Error:</strong>
                            <pre class="mb-0 mt-1" style="background: transparent; color: #f8d7da; font-size: 0.85rem;">{{ error_message }}</pre>
                        </div>
                    </div>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
