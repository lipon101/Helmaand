{% extends 'base.html' %}

{% block title %}Change Password | Helmaand{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card card-dark p-4 shadow">
                <h2 class="gold-text mb-3">Change Password</h2>
                <p class="text-secondary">Enter your new password below.</p>
                <hr class="border-secondary">
                <!-- VULNERABLE (CSRF - Password change): no {% csrf_token %} + view is @csrf_exempt -->
                <form method="POST" action="{% url 'accounts:change_password' %}">
                    <div class="mb-3">
                        <label class="form-label text-light">New Password</label>
                        <input type="password" name="new_password" class="form-control" placeholder="Enter new password" required>
                    </div>
                    <button type="submit" class="btn btn-gold w-100">Change Password</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
