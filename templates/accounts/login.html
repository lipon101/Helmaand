{% extends 'base.html' %}

{% block title %}Login | Helmaand{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card card-dark p-4 shadow">
                <h2 class="text-center gold-text mb-4">Account Login</h2>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label text-light">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter Username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-light">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter Password" required>
                    </div>
                    <button type="submit" class="btn btn-gold w-100 mt-3">Login</button>
                </form>
                <p class="text-center text-muted mt-3">
                    Don't have an account? <a href="{% url 'accounts:register' %}" class="gold-text">Register here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
