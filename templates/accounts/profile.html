{% extends 'base.html' %}

{% block title %}My Profile | Helmaand{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card card-dark p-4 shadow">
                <h2 class="gold-text mb-3">User Profile</h2>
                <!-- VULNERABLE (XSS - Self): username rendered with |safe -->
                <p class="text-secondary"><strong>Username:</strong> <span class="text-light">{{ user.username|safe }}</span></p>
                <p class="text-secondary"><strong>Email:</strong> {{ user.email }}</p>
                <hr class="border-secondary">
                <h4 class="gold-text mb-3">Update Shipping Info</h4>
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ p_form.as_p }}
                    <button type="submit" class="btn btn-gold mt-2">Save Profile Changes</button>
                </form>
                <hr class="border-secondary">
                <a href="{% url 'accounts:change_email' %}" class="btn btn-outline-gold btn-sm me-2">Change Email</a>
                <a href="{% url 'accounts:change_password' %}" class="btn btn-outline-gold btn-sm">Change Password</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
